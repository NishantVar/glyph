name = "Glyph"
grammar = "glyph"
path_suffixes = ["glyph"]
line_comments = ["// "]
brackets = [
  { start = "(", end = ")", close = true, newline = true },
  { start = "{", end = "}", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false },
]
auto_indent_using_last_non_empty_line = true
